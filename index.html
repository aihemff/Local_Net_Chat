<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat App | تطبيق الدردشة</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Login/Register Screen -->
    <div id="authContainer" class="auth-container">
        <div class="auth-form-wrapper">
            <div class="auth-logo">
                <h1>💬 Chat Room</h1>
                <p>غرفة الدردشة</p>
            </div>

            <!-- Login Form -->
            <div id="loginForm" class="auth-form active">
                <h2>Login</h2>
                <div class="form-group">
                    <label for="loginUsername">Username</label>
                    <input type="text" id="loginUsername" placeholder="Enter your username" />
                </div>
                <div class="form-group">
                    <label for="loginPassword">Password</label>
                    <input type="password" id="loginPassword" placeholder="Enter your password" />
                </div>
                <button id="loginBtn" class="auth-btn primary">Login</button>
                <p class="toggle-form">Don't have an account? <a href="#" onclick="toggleForm(event)">Register</a></p>
                <div id="loginError" class="error-message"></div>
            </div>

            <!-- Register Form -->
            <div id="registerForm" class="auth-form">
                <h2>Register</h2>
                <div class="form-group">
                    <label for="registerUsername">Username</label>
                    <input type="text" id="registerUsername" placeholder="Choose a username" />
                </div>
                <div class="form-group">
                    <label for="registerPassword">Password</label>
                    <input type="password" id="registerPassword" placeholder="Create a strong password" />
                </div>
                <div class="form-group">
                    <label for="registerPasswordConfirm">Confirm Password</label>
                    <input type="password" id="registerPasswordConfirm" placeholder="Confirm your password" />
                </div>
                <button id="registerBtn" class="auth-btn primary">Register</button>
                <p class="toggle-form">Already have an account? <a href="#" onclick="toggleForm(event)">Login</a></p>
                <div id="registerError" class="error-message"></div>
            </div>
        </div>
    </div>

    <!-- Chat Container (Hidden until logged in) -->
    <div id="chatContainer" class="chat-container" style="display: none;">
        <!-- Header -->
        <div class="chat-header">
            <div class="header-content">
                <h1 data-en="Chat Room" data-ar="غرفة الدردشة">Chat Room</h1>
                <p class="status" data-en="Online" data-ar="متصل">Online</p>
            </div>
            <div class="header-actions">
                <span id="currentUser" class="current-user"></span>
                <button class="lang-btn" id="langBtn" onclick="toggleLanguage()" data-en="العربية" data-ar="English">العربية</button>
                <button class="logout-btn" id="logoutBtn" onclick="logout()">Logout</button>
            </div>
        </div>

        <!-- Messages Container -->
        <div class="messages-container" id="messagesContainer">
            <div class="welcome-message">
                <div class="welcome-icon">💬</div>
                <h2 data-en="Welcome to Chat" data-ar="أهلا بك في الدردشة">Welcome to Chat</h2>
                <p data-en="Start a conversation now!" data-ar="ابدأ محادثة الآن!">Start a conversation now!</p>
            </div>
        </div>

        <!-- Input Area -->
        <div class="input-area">
            <input 
                type="text" 
                id="messageInput" 
                class="message-input" 
                placeholder="Type a message..." 
                data-placeholder-en="Type a message..."
                data-placeholder-ar="اكتب رسالة..."
            />
            <button class="send-btn" id="sendBtn" onclick="sendMessage()">
                <span data-en="Send" data-ar="إرسال">Send</span>
            </button>
        </div>

        <!-- User Count -->
        <div class="user-count">
            <p id="userCountText" data-en="Users online: " data-ar="المستخدمون متصلون: ">Users online: <span id="userCountNum">0</span></p>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
